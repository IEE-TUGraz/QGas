name: QGas
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.11.5

  # Core Data Science
  - pandas>=2.0.0
  - numpy>=1.24.0
  - scipy>=1.10.0

  # Geospatial Core
  - geopandas>=0.13.0
  - shapely>=2.0.0
  - fiona>=1.9.0
  - pyproj>=3.5.0
  - rtree>=1.0.0

  # Machine Learning
  - scikit-learn>=1.3.0
  - networkx>=3.0

  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # Image processing for GUI
  - pillow>=10.0.0

  # Data Processing
  - openpyxl>=3.1.0
  - tqdm>=4.65.0

  # GUI Framework (built into Python)
  # tkinter is included with Python

  # System utilities
  - pip>=23.0

  # pip packages for specialized dependencies
  - pip:
    - geojson>=3.0.0
    - websockets>=11.0
